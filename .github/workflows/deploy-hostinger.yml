# Deploy naar Hostinger bij push naar main.
# Vereist GitHub repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER   — uit hPanel (bijv. ftp.hostinger.com)
#   FTP_USERNAME — FTP-gebruiker voor deze site
#   FTP_PASSWORD — FTP-wachtwoord
# (geen FTP_REMOTE_DIR-secret meer: server-dir staat in dit bestand)
# Als bestanden op de verkeerde plek komen: pas server-dir hieronder aan
# (sommige FTP-accounts starten al in public_html → gebruik dan / ).
#
# Bij "Timeout (control socket)" / "Failed to connect":
#   — Controleer FTP_SERVER in hPanel → Websites → jouw site → Bestanden → FTP-accounts
#     (hostname kan per account verschillen; geen typfout of oude waarde).
#   — Test lokaal: ftp -p hostname 21 (of FileZilla) vanaf je eigen netwerk.
#   — FTPS-handshake kan soms hangen: probeer tijdelijk protocol: ftp (alleen om te testen)
#     of protocol: ftps-legacy als Hostinger dat vereist.
#   — SFTP is een ander protocol; deze Action ondersteunt géén SFTP (alleen FTP/FTPS).
#   — Zeldzaam: firewall blokkeert datacenter-IP's; dan Hostinger-support of deploy via andere route.
#
# Bij "connect ETIMEDOUT … :21 (control socket)":
#   — De runner krijgt géén TCP-verbinding naar poort 21 (niet hetzelfde als trage upload).
#   — Controleer het exacte FTP-hostname in hPanel (vaak ftp.<jouwdomein>.nl, niet je website-URL).
#   — Als de stap "Check FTP-poort 21" faalt: Hostinger blokkeert mogelijk inkomend FTP vanuit
#     cloud-datacenters (GitHub Actions). Oplossingen: handmatig uploaden (FileZilla), Hostinger
#     "Git integration" in hPanel, of deploy via een runner buiten GitHub (eigen VPS/PC).

name: Deploy to Hostinger (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Faalt snel met duidelijke melding i.p.v. minuten wachten op ETIMEDOUT in de FTP-action.
      - name: Check FTP-poort 21 bereikbaar
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          set -e
          if [ -z "$FTP_HOST" ]; then
            echo "::error::Secret FTP_SERVER is leeg. Vul in onder Settings → Secrets → Actions."
            exit 1
          fi
          echo "Test TCP naar poort 21 (max. ca. 45s met retries) …"
          ok=0
          for attempt in 1 2 3; do
            if timeout 15 bash -c "echo >/dev/tcp/$FTP_HOST/21" 2>/dev/null; then
              ok=1
              break
            fi
            echo "Poging $attempt: geen verbinding, opnieuw over 10s …"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Geen TCP-verbinding naar FTP-host op poort 21 (ETIMEDOUT). Controleer FTP_SERVER in GitHub-secrets en het hostname in hPanel. Als lokaal (FileZilla) wél werkt: mogelijk blokkeert Hostinger FTP vanaf GitHub; gebruik handmatige upload of Git-deploy in hPanel."
            exit 1
          fi
          echo "OK: poort 21 accepteert verbinding."

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          # Bij herhaald "Timeout (control socket)": probeer protocol: ftps-legacy of (tijdelijk test) protocol: ftp
          protocol: ftps
          port: 21
          # Langere wachttijd: trage verbindingen / grote sync; 120s was kort t.o.v. run ~2m
          timeout: 600000
          # losser TLS (helpend bij sommige shared hosts; zie action.yml 'strict or loose')
          security: loose
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            *.sql
            **/.DS_Store

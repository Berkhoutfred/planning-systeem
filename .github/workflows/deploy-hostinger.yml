# Deploy naar Hostinger bij push naar main.
# Vereist GitHub repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER   — uit hPanel (bijv. ftp.hostinger.com)
#   FTP_USERNAME — FTP-gebruiker voor deze site
#   FTP_PASSWORD — FTP-wachtwoord
# (geen FTP_REMOTE_DIR-secret meer: server-dir staat in dit bestand)
# Als bestanden op de verkeerde plek komen: pas server-dir hieronder aan
# (sommige FTP-accounts starten al in public_html → gebruik dan / ).
#
# Bij "Timeout (control socket)" / "Failed to connect":
#   — Controleer FTP_SERVER in hPanel → Websites → jouw site → Bestanden → FTP-accounts
#     (hostname kan per account verschillen; geen typfout of oude waarde).
#   — Test lokaal: ftp -p hostname 21 (of FileZilla) vanaf je eigen netwerk.
#   — FTPS-handshake kan soms hangen: probeer tijdelijk protocol: ftp (alleen om te testen)
#     of protocol: ftps-legacy als Hostinger dat vereist.
#   — SFTP is een ander protocol; deze Action ondersteunt géén SFTP (alleen FTP/FTPS).
#   — Zeldzaam: firewall blokkeert datacenter-IP's; dan Hostinger-support of deploy via andere route.

name: Deploy to Hostinger (FTP)

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          # Bij herhaald "Timeout (control socket)": probeer protocol: ftps-legacy of (tijdelijk test) protocol: ftp
          protocol: ftps
          port: 21
          # Langere wachttijd: trage verbindingen / grote sync; 120s was kort t.o.v. run ~2m
          timeout: 600000
          # losser TLS (helpend bij sommige shared hosts; zie action.yml 'strict or loose')
          security: loose
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            *.sql
            **/.DS_Store
